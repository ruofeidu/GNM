name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 00:00 UTC to catch regressions caused by upstream dependency updates
    - cron: '0 0 * * 0'
  workflow_dispatch:

# Restrict default permissions of GITHUB_TOKEN to read-only for repository contents.
permissions:
  contents: read

# Concurrency group ensures that only one workflow run per branch/PR is active at a time.
# If a new commit is pushed, any running job for that PR/branch is cancelled.
concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Run linters and formatters matching Google's internal style
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Use bash login shell to enable micromamba environment activation
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      # Setup Micromamba to install dependencies from environment-linux.yml.
      - name: Setup Micromamba
        uses: mamba-org/setup-micromamba@d7c9bd84e824b79d2af72a2d4196c7f4300d3476 # ratchet:mamba-org/setup-micromamba@v3
        with:
          environment-file: gnm/shape/environment-linux.yml
          environment-name: gnm
          cache-environment: true
          init-shell: bash

      # Runs Pylint using the committed .pylintrc configuration at the root
      - name: Run Pylint Check
        run: pylint gnm/
