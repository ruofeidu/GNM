name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    # Run weekly on Sundays at 00:00 UTC to catch regressions caused by upstream dependency updates
    - cron: '0 0 * * 0'
  workflow_dispatch:

# Restrict default permissions of GITHUB_TOKEN to read-only for repository contents.
permissions:
  contents: read

# Concurrency group ensures that only one workflow run per branch/PR is active at a time.
# If a new commit is pushed, any running job for that PR/branch is cancelled.
concurrency:
  group: lint-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  # Run linters and formatters matching Google's internal style
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: bash -e {0}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # ratchet:actions/checkout@v7.0.0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install gnm-shape package and linting dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e "./gnm/shape[all,dev]"

      - name: Run Pylint Check
        run: pylint gnm/
